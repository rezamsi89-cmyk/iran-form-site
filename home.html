<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل مدیریت</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body" data-app-shell="true" data-default-page="dashboard">
  <div class="app-layout">
    <aside id="sidebar-container" class="app-sidebar"></aside>

    <div class="app-main">
      <header id="header-container" class="app-header"></header>

      <main class="app-content">
        <div class="page-toolbar">
          <div>
            <h1 class="page-title" data-page-title>داشبورد</h1>
            <p class="page-subtitle" data-page-subtitle>نمای کلی سامانه</p>
          </div>
        </div>

        <section
          id="page-container"
          class="page-container fade-in"
          data-page-container
        >
          <div class="page-loading">در حال بارگذاری...</div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/layout-loader.js"></script>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

</body>
</html>
