<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پنل مدیریت</title>

    <!-- Bootstrap (اگر داری از CDN استفاده می‌کنی) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- CSS پروژه -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="app-body" data-app-shell="true" data-default-page="dashboard">
    <!-- Overlay (برای موبایل) -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <!-- HEADER mount -->
      <header id="headerMount"></header>

      <!-- SIDEBAR mount -->
      <aside id="sidebarMount" class="app-sidebar"></aside>

      <!-- MAIN content -->
      <div class="app-main">
        <!-- این بخش داخل header.html هم می‌تواند title/subtitle داشته باشد -->
        <main id="spaContainer" class="app-content" data-page-container></main>
      </div>
    </div>

    <!-- Bootstrap JS (اختیاری اگر لازم داری) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Layout Loader -->
    <script src="js/layout-loader.js"></script>
  </body>
</html>
