<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داشبورد مدیریتی</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- فایل استایل مشترک یکپارچه -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- هدر اصلی -->
  <header class="main-header py-3">
    <div class="container-fluid px-3 px-md-4 header-container">
      <div class="brand-section">
        <!-- دکمه همبرگری با استایل و انیمیشن مدرن CSS -->
        <button class="menu-toggle-btn" id="menuToggleBtn" aria-label="منو" type="button">
          <span class="hamburger-box">
            <span class="hamburger-inner"></span>
          </span>
        </button>
        <div class="logo-placeholder">س</div>
        <h1 class="system-title">سامانه هوشمند مدیریت</h1>
      </div>

      <div class="user-section">
        <div class="dropdown">
          <button class="user-profile-dropdown-btn dropdown-toggle" id="userMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle"></i>
            <!-- نام و نام خانوادگی به صورت پویا در این بخش قرار می‌گیرد -->
            <span class="ms-2" id="userNameDisplay">کاربر گرامی</span>
          </button>

          <ul class="dropdown-menu dropdown-menu-end custom-dropdown-menu" aria-labelledby="userMenuButton">
            <li>
              <a class="dropdown-item custom-dropdown-item spa-route" href="#profile" data-page="profile">
                <i class="bi bi-person-lines-fill"></i>
                مشاهده پروفایل
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button class="dropdown-item custom-dropdown-item text-danger" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i>
                خروج از حساب
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <!-- لایه تاریک پشت منو (در حالت موبایل) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- سایدبار منوی اصلی (کشویی) -->
  <aside class="sidebar" id="sidebar">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h2 class="h6 mb-0 fw-bold">منوی اصلی</h2>
      <button class="btn btn-sm" id="sidebarCloseBtn" aria-label="بستن منو">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="sidebar-link spa-route" data-page="dashboard">
        <i class="bi bi-house-door"></i>
        <span>داشبورد</span>
      </a>

      <a href="#profile" class="sidebar-link spa-route" data-page="profile">
        <i class="bi bi-person-vcard"></i>
        <span>پروفایل کاربر</span>
      </a>

      <a href="#files" class="sidebar-link spa-route" data-page="files">
        <i class="bi bi-folder2-open"></i>
        <span>مدیریت پرونده‌ها</span>
      </a>

      <a href="#reports" class="sidebar-link spa-route" data-page="reports">
        <i class="bi bi-bar-chart-line"></i>
        <span>گزارش‌ها</span>
      </a>

      <a href="#settings" class="sidebar-link spa-route" data-page="settings">
        <i class="bi bi-gear"></i>
        <span>تنظیمات</span>
      </a>

      <a href="#" class="sidebar-link text-danger" id="sidebarLogoutBtn">
        <i class="bi bi-box-arrow-right"></i>
        <span>خروج از حساب</span>
      </a>
    </nav>
  </aside>

  <!-- کانتینر بارگذاری صفحات داینامیک (SPA) -->
  <main class="content-area-dynamic" id="spaContainer"></main>

  <!-- جاوا اسکریپت با اتکا به Bootstrap 5 Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // آدرس ورکر اختصاصی پروژه
    const API_BASE_URL = 'https://iran-form-api.reza-msi89.workers.dev'; 

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const sidebarLogoutBtn = document.getElementById('sidebarLogoutBtn');
    const spaContainer = document.getElementById('spaContainer');
    const spaRoutes = document.querySelectorAll('.spa-route');
    const userNameDisplay = document.getElementById('userNameDisplay');

    // نگاشت آدرس صفحات داخلی در پوشه اختصاصی pages
    const pages = {
      dashboard: 'pages/dashboard.html',
      profile: 'pages/profile.html',
      files: 'pages/files.html',
      reports: 'pages/reports.html',
      settings: 'pages/settings.html'
    };

    // بررسی ورود معتبر و لود نام و نام خانوادگی کاربر
    function validateAuthAndLoadUser() {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const username = localStorage.getItem('username');
      const storedFullName = localStorage.getItem('fullName');
      const userDataString = localStorage.getItem('user_data');

      // اگر کاربر لاگین نکرده باشد، به صفحه ورود هدایت می‌شود
      if (isLoggedIn !== 'true') {
        window.location.replace('index.html');
        return false;
      }

      if (storedFullName) {
        userNameDisplay.textContent = storedFullName;
      } else if (userDataString) {
        try {
          const userData = JSON.parse(userDataString);
          const fullName = (userData.firstName && userData.lastName) 
            ? `${userData.firstName} ${userData.lastName}` 
            : (userData.fullName || userData.name);
          userNameDisplay.textContent = fullName || username || 'کاربر گرامی';
        } catch (e) {
          userNameDisplay.textContent = username || 'کاربر گرامی';
        }
      } else {
        userNameDisplay.textContent = username || 'کاربر گرامی';
      }

      return true;
    }

    // خروج از حساب کاربری و پاکسازی اطلاعات محلی
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('username');
      localStorage.removeItem('fullName');
      localStorage.removeItem('user_data');
      window.location.replace('index.html');
    }

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('show');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('show');
    }

    function updateActiveLink(pageName) {
      spaRoutes.forEach(link => {
        if (link.classList.contains('sidebar-link') || link.classList.contains('dropdown-item')) {
          link.classList.toggle('active', link.dataset.page === pageName);
        }
      });
    }

    function getCleanHtml(htmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const customRoot = doc.querySelector('#pageContent') || doc.querySelector('main');
      return customRoot ? customRoot.innerHTML : (doc.body ? doc.body.innerHTML : htmlText);
    }

    // بارگذاری صفحات داینامیک
    async function loadRoute(pageName, updateHistory = true) {
      const fileUrl = pages[pageName];
      if (!fileUrl) return;

      spaContainer.innerHTML = `
        <div class="spa-loading-wrapper py-5 text-center">
          <div class="spa-loading d-inline-flex flex-column align-items-center gap-3">
            <div class="spinner-border text-success" role="status"></div>
            <span class="text-muted">در حال بارگذاری اطلاعات...</span>
          </div>
        </div>
      `;

      try {
        const response = await fetch(fileUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('خطا در ارتباط با سرور');

        const html = await response.text();
        
        // اعمال افکت انیمیشن fade-in هنگام ورود اطلاعات
        spaContainer.innerHTML = `<div class="fade-in">${getCleanHtml(html)}</div>`;
        updateActiveLink(pageName);

        if (updateHistory) {
          history.pushState({ page: pageName }, '', '#' + pageName);
        }

        closeSidebar();

        // اجرای منطق‌های جاوااسکریپتی هر صفحه پس از تزریق به DOM
        executePageScripts(pageName);

      } catch (error) {
        console.error(error);
        spaContainer.innerHTML = `
          <div class="container-fluid p-4">
            <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
              <i class="bi bi-exclamation-triangle-fill"></i>
              <div>خطا در بارگذاری محتوای صفحه. لطفاً اتصال اینترنت خود را بررسی کنید.</div>
            </div>
          </div>
        `;
      }
    }

    // مدیریت اسکریپت‌ها و فراخوانی APIها برای هر زیرصفحه
    function executePageScripts(pageName) {
      if (pageName === 'dashboard') {
        initDashboardController();
      } else if (pageName === 'profile') {
        initProfileController();
      }
    }

    // ==========================================
    // ۱. کنترلر صفحه داشبورد (نمایش، حذف و آماده‌سازی ویرایش کاربران)
    // ==========================================
    async function initDashboardController() {
      const usersTableBody = document.getElementById('usersTableBody');
      if (!usersTableBody) return; // در صورتی که جدول کاربران در صفحه وجود نداشته باشد

      usersTableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4"><div class="spinner-border spinner-border-sm text-success me-2"></div>در حال دریافت لیست کاربران...</td></tr>`;

      try {
        const res = await fetch(`${API_BASE_URL}/users`);
        const data = await res.json();

        if (data.success && data.users) {
          renderUsersList(data.users);
        } else {
          usersTableBody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">خطا در خواندن اطلاعات از سرور.</td></tr>`;
        }
      } catch (error) {
        console.error("Error fetching users:", error);
        usersTableBody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">عدم برقراری ارتباط با سرور.</td></tr>`;
      }
    }

    function renderUsersList(users) {
      const usersTableBody = document.getElementById('usersTableBody');
      if (!usersTableBody) return;

      if (users.length === 0) {
        usersTableBody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">هیچ کاربری ثبت نشده است.</td></tr>`;
        return;
      }

      usersTableBody.innerHTML = '';
      users.forEach((user, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${user.first_name} ${user.last_name}</td>
          <td>${user.username}</td>
          <td>${user.national_code}</td>
          <td>${user.phone}</td>
          <td>${user.province || '-'} / ${user.city || '-'}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary edit-user-btn me-1" 
              data-firstname="${user.first_name}"
              data-lastname="${user.last_name}"
              data-username="${user.username}"
              data-nationalcode="${user.national_code}"
              data-phone="${user.phone}"
              data-province="${user.province || ''}"
              data-city="${user.city || ''}">
              <i class="bi bi-pencil-square"></i> ویرایش
            </button>
            <button class="btn btn-sm btn-outline-danger delete-user-btn" data-nationalcode="${user.national_code}">
              <i class="bi bi-trash"></i> حذف
            </button>
          </td>
        `;
        usersTableBody.appendChild(row);
      });

      // اتصال رویداد حذف کاربر
      document.querySelectorAll('.delete-user-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          const nationalCode = this.dataset.nationalcode;
          if (confirm(`آیا از حذف کاربر با کد ملی ${nationalCode} اطمینان دارید؟`)) {
            try {
              const res = await fetch(`${API_BASE_URL}/users/delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nationalCode })
              });
              const data = await res.json();
              if (data.success) {
                alert('کاربر با موفقیت حذف شد.');
                initDashboardController(); // بارگذاری مجدد لیست
              } else {
                alert('خطا: ' + (data.error || 'عملیات حذف ناموفق بود.'));
              }
            } catch (err) {
              alert('خطا در ارتباط با سرور.');
            }
          }
        });
      });

      // اتصال رویداد ویرایش کاربر (انتقال اطلاعات به فرم ویرایش)
      document.querySelectorAll('.edit-user-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const userData = {
            firstName: this.dataset.firstname,
            lastName: this.dataset.lastname,
            username: this.dataset.username,
            nationalCode: this.dataset.nationalcode,
            phone: this.dataset.phone,
            province: this.dataset.province,
            city: this.dataset.city,
            isEditMode: true
          };

          // ذخیره در sessionStorage جهت استفاده در فرم ثبت‌نام / ویرایش
          sessionStorage.setItem('editUserData', JSON.stringify(userData));
          
          // هدایت کاربر به صفحه فرم یا پروفایل جهت انجام ویرایش
          loadRoute('profile'); 
        });
      });
    }

    // ==========================================
    // ۲. کنترلر صفحه پروفایل (نمایش اطلاعات یا انجام ویرایش کاربر)
    // ==========================================
    function initProfileController() {
      // فرم‌های پروفایل یا فرم ویرایش اختصاصی
      const profileForm = document.getElementById('profileForm');
      const editUserDataStr = sessionStorage.getItem('editUserData');

      if (editUserDataStr && profileForm) {
        // اگر اطلاعات ویرایش در Session وجود داشت، فرم را پر می‌کنیم
        const editData = JSON.parse(editUserDataStr);
        
        // پر کردن فیلدها با توجه به ساختار IDها در فایل profile.html
        if (document.getElementById('p_firstName')) document.getElementById('p_firstName').value = editData.firstName;
        if (document.getElementById('p_lastName')) document.getElementById('p_lastName').value = editData.lastName;
        if (document.getElementById('p_username')) document.getElementById('p_username').value = editData.username;
        if (document.getElementById('p_nationalCode')) {
          document.getElementById('p_nationalCode').value = editData.nationalCode;
          document.getElementById('p_nationalCode').readOnly = true; // کد ملی کلید اصلی است و نباید ویرایش شود
        }
        if (document.getElementById('p_phone')) document.getElementById('p_phone').value = editData.phone;
        if (document.getElementById('p_province')) document.getElementById('p_province').value = editData.province;
        if (document.getElementById('p_city')) document.getElementById('p_city').value = editData.city;

        // تغییر عنوان دکمه فرم به "ثبت تغییرات"
        const submitBtn = profileForm.querySelector('button[type="submit"]');
        if (submitBtn) submitBtn.textContent = 'بروزرسانی اطلاعات کاربر';

        // رویداد سابمیت فرم برای ارسال درخواست ویرایش
        profileForm.addEventListener('submit', async function(e) {
          e.preventDefault();

          const updatedData = {
            nationalCode: editData.nationalCode, // از داده ذخیره شده قبلی (غیرقابل تغییر در ظاهر)
            firstName: document.getElementById('p_firstName').value,
            lastName: document.getElementById('p_lastName').value,
            username: document.getElementById('p_username').value,
            phone: document.getElementById('p_phone').value,
            province: document.getElementById('p_province')?.value || "",
            city: document.getElementById('p_city')?.value || ""
          };

          try {
            const res = await fetch(`${API_BASE_URL}/users/update`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(updatedData)
            });
            const result = await res.json();

            if (result.success) {
              alert('اطلاعات با موفقیت بروزرسانی شد.');
              sessionStorage.removeItem('editUserData'); // پاک کردن اطلاعات موقت ویرایش
              loadRoute('dashboard'); // بازگشت به داشبورد
            } else {
              alert('خطا در ویرایش: ' + (result.error || 'عملیات ناموفق'));
            }
          } catch (err) {
            alert('عدم پاسخگویی سرور.');
          }
        });

        // پاکسازی موقت session در صورتی که کاربر صفحه را ترک کند
        sessionStorage.removeItem('editUserData');
      }
    }

    // رویدادهای سایدبار کشویی
    menuToggleBtn.addEventListener('click', openSidebar);
    sidebarCloseBtn.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    
    logoutBtn.addEventListener('click', logout);
    sidebarLogoutBtn.addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    spaRoutes.forEach(link => {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        const pageName = this.dataset.page;
        if (pageName) {
          loadRoute(pageName);
        }
      });
    });

    window.addEventListener('popstate', (e) => {
      const pageName = e.state?.page || window.location.hash.replace('#', '') || 'dashboard';
      if (pages[pageName]) {
        loadRoute(pageName, false);
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const isAuthenticated = validateAuthAndLoadUser();
      if (!isAuthenticated) return;

      const currentHash = window.location.hash.replace('#', '');
      const defaultPage = pages[currentHash] ? currentHash : 'dashboard';
      loadRoute(defaultPage, false);
    });
  </script>
</body>
</html>
