<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خانه | سامانه مدیریت</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- اضافه شدن فایل استایل مرکزی -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="main-header py-3">
    <div class="container-fluid px-3 px-md-4 header-container">
      <div class="brand-section">
        <button class="menu-toggle-btn" id="menuToggleBtn"><i class="bi bi-list"></i></button>
        <div class="logo-placeholder">س</div>
        <h1 class="system-title">سامانه هوشمند مدیریت</h1>
      </div>
      <div class="user-section">
        <div class="dropdown">
          <button class="user-profile-dropdown-btn dropdown-toggle" id="userMenuButton" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i>
            <span class="ms-2">احمد محمدی</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end custom-dropdown-menu">
            <li><a class="dropdown-item custom-dropdown-item" href="profile.html" target="main-frame"><i class="bi bi-person-lines-fill"></i> مشاهده پروفایل</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button class="dropdown-item custom-dropdown-item text-danger" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> خروج از حساب</button></li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h2 class="h6 mb-0 fw-bold">منوی اصلی</h2>
      <button class="btn btn-sm" id="sidebarCloseBtn"><i class="bi bi-x-lg"></i></button>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" target="main-frame" class="sidebar-link active" data-page="dashboard">
        <i class="bi bi-house-door"></i>
        <span>داشبورد</span>
      </a>
      <a href="profile.html" target="main-frame" class="sidebar-link" data-page="profile">
        <i class="bi bi-person-vcard"></i>
        <span>پروفایل کاربر</span>
      </a>
      <a href="files.html" target="main-frame" class="sidebar-link" data-page="files">
        <i class="bi bi-folder2-open"></i>
        <span>مدیریت پرونده‌ها</span>
      </a>
      <a href="reports.html" target="main-frame" class="sidebar-link" data-page="reports">
        <i class="bi bi-bar-chart-line"></i>
        <span>گزارش‌ها</span>
      </a>
      <a href="settings.html" target="main-frame" class="sidebar-link" data-page="settings">
        <i class="bi bi-gear"></i>
        <span>تنظیمات</span>
      </a>
      <a href="#" class="sidebar-link text-danger" id="sidebarLogoutBtn">
        <i class="bi bi-box-arrow-right"></i>
        <span>خروج از حساب</span>
      </a>
    </nav>
  </aside>

  <main class="content-area-dynamic">
    <iframe src="dashboard.html" name="main-frame" id="mainFrame" class="dynamic-iframe"></iframe>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const sidebarLogoutBtn = document.getElementById('sidebarLogoutBtn');
    const sidebarLinks = document.querySelectorAll('.sidebar-link');
    const mainFrame = document.getElementById('mainFrame');

    menuToggleBtn.addEventListener('click', () => { sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); });
    sidebarCloseBtn.addEventListener('click', () => { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); });
    sidebarOverlay.addEventListener('click', () => { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); });

    function setActiveSidebarLink(targetHref) {
      const normalizedTarget = new URL(targetHref, window.location.href).pathname.replace(/\/$/, '');
      sidebarLinks.forEach(link => {
        link.classList.remove('active');
        const linkHref = new URL(link.getAttribute('href'), window.location.href).pathname.replace(/\/$/, '');
        if (linkHref === normalizedTarget) link.classList.add('active');
      });
    }

    sidebarLinks.forEach(link => {
      link.addEventListener('click', function () {
        if (this.id === 'sidebarLogoutBtn') return;
        sidebarLinks.forEach(item => item.classList.remove('active'));
        this.classList.add('active');
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
      });
    });

    mainFrame.addEventListener('load', () => {
      try { setActiveSidebarLink(mainFrame.contentWindow.location.href); } catch(e) {}
    });

    function logout() { localStorage.removeItem('token'); window.location.replace('login.html'); }
    logoutBtn.addEventListener('click', logout);
    sidebarLogoutBtn.addEventListener('click', (e) => { e.preventDefault(); logout(); });
  </script>
</body>
</html>
