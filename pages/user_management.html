<div class="container-fluid fade-in">
  <div class="row mb-4 align-items-center">
    <div class="col-md-6 col-12">
      <h4 class="fw-bold text-dark mb-1">مدیریت کاربران</h4>
      <p class="text-muted small mb-0">لیست، جستجو، فیلتر و مدیریت اطلاعات کاربران سیستم</p>
    </div>
    <div class="col-md-6 col-12 text-md-end mt-3 mt-md-0">
      <button class="btn btn-success btn-custom" id="btnAddNewUser">
        <i class="bi bi-person-plus-fill me-1"></i> ثبت کاربر جدید
      </button>
    </div>
  </div>

  <!-- کارت‌های خلاصه وضعیت کاربران -->
  <div class="row mb-4">
    <div class="col-xl-3 col-sm-6 col-12 mb-3 mb-xl-0">
      <div class="card stat-card shadow-sm h-100">
        <div class="card-body d-flex align-items-center">
          <div class="rounded-circle bg-light-primary p-3 me-3 d-flex align-items-center justify-content-center" style="width: 54px; height: 54px;">
            <i class="bi bi-people text-primary fs-3"></i>
          </div>
          <div>
            <h6 class="text-muted mb-1">کل کاربران</h6>
            <h4 class="fw-bold mb-0 text-dark" id="statTotalUsers">۰</h4>
          </div>
        </div>
      </div>
    </div>
    <div class="col-xl-3 col-sm-6 col-12 mb-3 mb-xl-0">
      <div class="card stat-card shadow-sm h-100">
        <div class="card-body d-flex align-items-center">
          <div class="rounded-circle bg-light-success p-3 me-3 d-flex align-items-center justify-content-center" style="width: 54px; height: 54px;">
            <i class="bi bi-globe text-success fs-3"></i>
          </div>
          <div>
            <h6 class="text-muted mb-1">استان‌های فعال</h6>
            <h4 class="fw-bold mb-0 text-dark" id="statActiveProvinces">۰</h4>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- بخش فیلترها و جستجو -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <h6 class="fw-bold text-dark mb-3"><i class="bi bi-funnel me-1"></i> جستجو و فیلتر پیشرفته</h6>
      <form id="userFilterForm">
        <div class="row g-3">
          <div class="col-lg-4 col-md-6 col-12">
            <label class="form-label">جستجوی متنی</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
              <input type="text" id="searchQuery" class="form-control border-start-0" placeholder="نام، کد ملی، شماره موبایل...">
            </div>
          </div>
          <div class="col-lg-3 col-md-6 col-12">
            <label class="form-label">استان</label>
            <select id="filterProvince" class="form-select">
              <option value="">همه استان‌ها</option>
            </select>
          </div>
          <div class="col-lg-3 col-md-6 col-12">
            <label class="form-label">شهر</label>
            <select id="filterCity" class="form-select" disabled>
              <option value="">همه شهرها</option>
            </select>
          </div>
          <div class="col-lg-2 col-md-12 col-12 d-flex align-items-end">
            <button type="button" id="btnResetFilters" class="btn btn-outline-secondary w-100 btn-custom">
              <i class="bi bi-arrow-counterclockwise me-1"></i> بازنشانی
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- جدول لیست کاربران -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0 py-3 d-flex flex-wrap justify-content-between align-items-center gap-2">
      <h6 class="fw-bold text-dark mb-0"><i class="bi bi-list-ul me-1"></i> لیست ثبت‌نام شدگان</h6>
      <div class="d-flex gap-2">
        <button class="btn btn-light btn-sm border" id="btnPrintUsers" title="چاپ لیست">
          <i class="bi bi-printer me-1"></i> چاپ
        </button>
        <button class="btn btn-light btn-sm border text-success" id="btnExportCSV" title="خروجی اکسل">
          <i class="bi bi-file-earmark-excel me-1"></i> اکسل (CSV)
        </button>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table custom-user-table align-middle mb-0 w-100">
        <thead>
          <tr>
            <th class="ps-4">نام و نام خانوادگی</th>
            <th>کد ملی</th>
            <th>شماره تلفن</th>
            <th>استان و شهر</th>
            <th>تاریخ ثبت‌نام</th>
            <th class="text-center pe-4" style="width: 140px;">عملیات</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <!-- با جاوا اسکریپت پر می‌شود -->
          <tr>
            <td colspan="6" class="text-center py-5">
              <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">در حال بارگذاری...</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
