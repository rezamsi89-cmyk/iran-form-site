<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود به پنل کاربری</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- فایل استایل مشترک یکپارچه -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page-bg">

  <div class="card login-card">
    <div class="top-badge">پنل ورود کاربران</div>

    <div class="card-body">
      <h3 class="text-center login-title">ورود به سایت</h3>
      <p class="text-center login-subtitle">لطفاً اطلاعات ورود خود را وارد کنید</p>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">نام کاربری</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="نام کاربری خود را وارد کنید"
            required
          />
          <div class="invalid-feedback">
            لطفاً نام کاربری را وارد کنید.
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">رمز عبور</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="رمز عبور خود را وارد کنید"
              required
              style="border-radius: 0 12px 12px 0;"
            />
            <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-radius: 12px 0 0 12px; border-color: #dee2e6;">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
            <div class="invalid-feedback">
              لطفاً رمز عبور را وارد کنید.
            </div>
          </div>
        </div>

        <div class="alert alert-danger d-none mt-3" id="errorAlert"></div>
        <div class="alert alert-success d-none mt-3" id="successAlert">
          ورود با موفقیت انجام شد. در حال انتقال...
        </div>

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-success" id="loginBtn">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="loginSpinner"></span>
            <span id="loginBtnText">ورود</span>
          </button>
          <a href="register.html" class="btn btn-outline-secondary">ثبت‌نام جدید</a>
        </div>

        <div class="text-center">
          <a href="forgot.html" class="forgot-link">فراموشی رمز عبور</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://iran-form-api.reza-msi89.workers.dev/login";

    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const successAlert = document.getElementById("successAlert");
    const errorAlert = document.getElementById("errorAlert");
    const loginBtn = document.getElementById("loginBtn");
    const loginSpinner = document.getElementById("loginSpinner");
    const loginBtnText = document.getElementById("loginBtnText");

    // بررسی اینکه آیا قبلاً لاگین کرده است یا خیر
    window.addEventListener('DOMContentLoaded', () => {
      const isLoggedIn = localStorage.getItem("isLoggedIn");
      const username = localStorage.getItem("username");
      if (isLoggedIn === "true" && username) {
        window.location.replace("home.html");
      }
    });

    // قابلیت نمایش و مخفی کردن پسورد
    const togglePassword = document.getElementById("togglePassword");
    const eyeIcon = document.getElementById("eyeIcon");

    togglePassword.addEventListener("click", function () {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      eyeIcon.classList.toggle("bi-eye");
      eyeIcon.classList.toggle("bi-eye-slash");
    });

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      successAlert.classList.add("d-none");
      errorAlert.classList.add("d-none");

      if (!loginForm.checkValidity()) {
        loginForm.classList.add("was-validated");
        return;
      }

      const username = usernameInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      // اعمال وضعیت بارگذاری
      loginBtn.disabled = true;
      loginSpinner.classList.remove("d-none");
      loginBtnText.textContent = " در حال بررسی...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          successAlert.classList.remove("d-none");
          loginForm.classList.remove("was-validated");

          // ۱. ذخیره اطلاعات هماهنگ با روش اصلی برای استفاده از نام داینامیک
          const user_data = {
            username: username,
            fullName: result.fullName || result.name || `کاربر ${username}`
          };
          localStorage.setItem("user_data", JSON.stringify(user_data));
          
          // ۲. ذخیره اطلاعات لاگین که کدهای دیگر پروژه به آن متکی هستند
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("username", username);

          // تغییر مسیر به صفحه خانه (SPA)
          setTimeout(() => {
            window.location.href = "home.html";
          }, 1000);
        } else {
          errorAlert.textContent = result.error || "نام کاربری یا رمز عبور اشتباه است.";
          errorAlert.classList.remove("d-none");
        }
      } catch (error) {
        errorAlert.textContent = "ارتباط با سرور برقرار نشد. لطفاً اینترنت خود را بررسی کنید.";
        errorAlert.classList.remove("d-none");
      } finally {
        loginBtn.disabled = false;
        loginSpinner.classList.add("d-none");
        loginBtnText.textContent = "ورود";
      }
    });
  </script>
</body>
</html>
