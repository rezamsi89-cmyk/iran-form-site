<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعیین رمز عبور جدید</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- استایل‌های متمرکز پروژه -->
  <link href="style.css" rel="stylesheet" />
</head>
<body class="auth-body">

  <div class="card auth-card reset-card fade-in" id="resetCard">
    <div class="top-badge">تعیین رمز عبور جدید</div>

    <div class="card-body">
      <h3 class="text-center mb-2">تغییر رمز عبور</h3>
      <p class="text-center text-muted mb-4">رمز عبور جدید خود را وارد و تایید کنید.</p>

      <form id="resetForm" novalidate>
        <!-- رمز عبور جدید -->
        <div class="mb-3">
          <label for="password" class="form-label">رمز عبور جدید</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" required placeholder="حداقل ۶ کاراکتر" minlength="6" />
            <button class="btn btn-outline-secondary password-toggle-btn" type="button" id="togglePass">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="invalid-feedback d-block" id="passwordFeedback"></div>
        </div>

        <!-- تکرار رمز عبور -->
        <div class="mb-4">
          <label for="confirmPassword" class="form-label">تکرار رمز عبور</label>
          <input type="password" class="form-control" id="confirmPassword" required placeholder="تکرار رمز عبور" />
          <div class="invalid-feedback" id="matchFeedback">رمزهای عبور مطابقت ندارند.</div>
        </div>

        <div class="alert alert-danger d-none mt-3" id="errorAlert"></div>
        <div class="alert alert-success d-none mt-3" id="successAlert">
          رمز عبور با موفقیت تغییر کرد. در حال هدایت به صفحه ورود...
        </div>

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-success btn-custom" id="submitBtn">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="spinner"></span>
            <span id="btnText">ذخیره رمز عبور</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://iran-form-api.reza-msi89.workers.dev/reset";

    // دریافت پارامترهای URL
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('user');
    const token = urlParams.get('token');

    // اگر کاربر مستقیم وارد شود و توکن نداشته باشد، فرم پنهان و پیغام خطای زیبا نمایش داده می‌شود
    if (!username || !token) {
        const cardElement = document.getElementById("resetCard");
        cardElement.innerHTML = `
          <div class="top-badge bg-danger text-white">خطای دسترسی</div>
          <div class="card-body text-center p-4">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
            <h4 class="mb-3">لینک نامعتبر</h4>
            <p class="text-muted mb-4">لینک بازیابی رمز عبور شما نامعتبر یا منقضی شده است. لطفا دوباره درخواست دهید.</p>
            <div class="d-grid">
              <a href="index.html" class="btn btn-outline-secondary btn-custom">بازگشت به صفحه ورود</a>
            </div>
          </div>`;
    }

    const resetForm = document.getElementById("resetForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const successAlert = document.getElementById("successAlert");
    const errorAlert = document.getElementById("errorAlert");
    const passwordFeedback = document.getElementById("passwordFeedback");

    // قابلیت نمایش رمز
    document.getElementById("togglePass").addEventListener("click", () => {
        const type = password.getAttribute("type") === "password" ? "text" : "password";
        password.setAttribute("type", type);
        confirmPassword.setAttribute("type", type);
        document.getElementById("eyeIcon").classList.toggle("bi-eye-slash");
        document.getElementById("eyeIcon").classList.toggle("bi-eye");
    });

    // بررسی همخوانی رمزها به صورت همزمان (Real-time Validation)
    function validatePasswords() {
      // بررسی طول رمز عبور اول
      if (password.value.length < 6) {
        password.classList.add("is-invalid");
        passwordFeedback.textContent = "رمز عبور باید حداقل ۶ کاراکتر باشد.";
      } else {
        password.classList.remove("is-invalid");
        passwordFeedback.textContent = "";
      }

      // بررسی مطابقت رمز دوم با اول
      if (password.value !== confirmPassword.value) {
        confirmPassword.setCustomValidity("عدم مطابقت");
        confirmPassword.classList.add("is-invalid");
      } else {
        confirmPassword.setCustomValidity("");
        confirmPassword.classList.remove("is-invalid");
      }
    }

    password.addEventListener("input", validatePasswords);
    confirmPassword.addEventListener("input", validatePasswords);

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // اجرای بررسی نهایی تطابق پسوردها
      validatePasswords();
      
      if (!resetForm.checkValidity() || password.value.length < 6 || password.value !== confirmPassword.value) {
        resetForm.classList.add("was-validated");
        return;
      }

      // پنهان کردن خطاهای قبلی
      errorAlert.classList.add("d-none");
      
      // حالت بارگذاری (Loading)
      submitBtn.disabled = true;
      spinner.classList.remove("d-none");
      btnText.textContent = " در حال ذخیره...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, token, newPassword: password.value })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          successAlert.classList.remove("d-none");
          // هدایت خودکار پس از ۲ ثانیه به صفحه ورود اصلی (index.html)
          setTimeout(() => window.location.replace("index.html"), 2000);
        } else {
          errorAlert.textContent = result.error || "خطا در بروزرسانی رمز عبور.";
          errorAlert.classList.remove("d-none");
          submitBtn.disabled = false;
          spinner.classList.add("d-none");
          btnText.textContent = "ذخیره رمز عبور";
        }
      } catch (err) {
        errorAlert.textContent = "خطا در ارتباط با سرور. لطفا اتصال خود را بررسی کنید.";
        errorAlert.classList.remove("d-none");
        submitBtn.disabled = false;
        spinner.classList.add("d-none");
        btnText.textContent = "ذخیره رمز عبور";
      }
    });
  </script>
</body>
</html>
