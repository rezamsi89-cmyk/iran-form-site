<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعیین رمز عبور جدید</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    @font-face {
      font-family: "Shabnam FD";
      src: url("./fonts/Shabnam-FD-Regular.woff2") format("woff2"),
           url("./fonts/Shabnam-FD-Regular.woff") format("woff");
      font-weight: 400;
      font-display: swap;
    }

    * { font-family: "Shabnam FD", Tahoma, sans-serif !important; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #f8f9fa, #e8f5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .reset-card {
      width: 100%;
      max-width: 430px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      background: #ffffff;
      overflow: hidden;
    }

    .top-badge {
      background: #198754;
      color: white;
      text-align: center;
      padding: 14px;
      font-weight: 700;
      font-size: 18px;
    }

    .card-body { padding: 35px 28px; }
    .form-control { border-radius: 12px; padding: 12px 14px; }
    .btn { border-radius: 12px; padding: 12px; font-weight: 700; }
  </style>
</head>
<body>

  <div class="card reset-card">
    <div class="top-badge">تعیین رمز عبور جدید</div>

    <div class="card-body">
      <p class="text-center text-muted mb-4">رمز عبور جدید خود را وارد و تایید کنید.</p>

      <form id="resetForm" novalidate>
        <!-- رمز عبور جدید -->
        <div class="mb-3">
          <label for="password" class="form-label">رمز عبور جدید</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" required placeholder="حداقل ۶ کاراکتر" minlength="6" />
            <button class="btn btn-outline-secondary" type="button" id="togglePass" style="border-radius: 12px 0 0 12px; border-color: #dee2e6;">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="invalid-feedback">رمز عبور باید حداقل ۶ کاراکتر باشد.</div>
        </div>

        <!-- تکرار رمز عبور -->
        <div class="mb-4">
          <label for="confirmPassword" class="form-label">تکرار رمز عبور</label>
          <input type="password" class="form-control" id="confirmPassword" required placeholder="تکرار رمز عبور" />
          <div class="invalid-feedback" id="matchFeedback">رمزهای عبور مطابقت ندارند.</div>
        </div>

        <div class="alert alert-danger d-none" id="errorAlert"></div>
        <div class="alert alert-success d-none" id="successAlert">
          رمز عبور با موفقیت تغییر کرد. در حال هدایت به صفحه ورود...
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success" id="submitBtn">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="spinner"></span>
            <span id="btnText">ذخیره رمز عبور</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://iran-form-api.reza-msi89.workers.dev/reset";

    // دریافت پارامترهای URL
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('user');
    const token = urlParams.get('token');

    // اگر کاربر مستقیم وارد شود و توکن نداشته باشد
    if (!username || !token) {
        document.body.innerHTML = '<div class="alert alert-danger">لینک بازیابی نامعتبر است.</div>';
    }

    const resetForm = document.getElementById("resetForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const successAlert = document.getElementById("successAlert");
    const errorAlert = document.getElementById("errorAlert");

    // قابلیت نمایش رمز
    document.getElementById("togglePass").addEventListener("click", () => {
        const type = password.getAttribute("type") === "password" ? "text" : "password";
        password.setAttribute("type", type);
        confirmPassword.setAttribute("type", type);
        document.getElementById("eyeIcon").classList.toggle("bi-eye-slash");
    });

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // اعتبارسنجی
      if (password.value !== confirmPassword.value) {
        confirmPassword.classList.add("is-invalid");
        return;
      }
      
      if (!resetForm.checkValidity()) {
        resetForm.classList.add("was-validated");
        return;
      }

      confirmPassword.classList.remove("is-invalid");
      submitBtn.disabled = true;
      spinner.classList.remove("d-none");
      btnText.textContent = " در حال ذخیره...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, token, newPassword: password.value })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          successAlert.classList.remove("d-none");
          setTimeout(() => window.location.href = "login.html", 2000);
        } else {
          errorAlert.textContent = result.error || "خطا در بروزرسانی رمز عبور.";
          errorAlert.classList.remove("d-none");
        }
      } catch (err) {
        errorAlert.textContent = "خطا در ارتباط با سرور.";
        errorAlert.classList.remove("d-none");
      } finally {
        submitBtn.disabled = false;
        spinner.classList.add("d-none");
        btnText.textContent = "ذخیره رمز عبور";
      }
    });
  </script>
</body>
</html>
