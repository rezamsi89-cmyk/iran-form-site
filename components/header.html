<header class="top-header app-header">
  <div class="container-fluid app-header-inner">
    <div class="app-header-right">
      <button class="btn btn-link p-0 d-lg-none text-dark app-header-menu-btn" id="menuToggle" aria-label="باز کردن منو">
        <i class="bi bi-list fs-2"></i>
      </button>

      <a href="#dashboard" class="app-header-brand">
        <div class="app-header-brand-badge">پنل</div>
        <div class="app-header-brand-text">
          <h1 class="app-header-title">مدیریت</h1>
          <p class="app-header-subtitle">داشبورد سازمانی</p>
        </div>
      </a>
    </div>

    <div class="dropdown">
      <button
        class="app-header-user"
        type="button"
        id="userMenuBtn"
        data-bs-toggle="dropdown"
        aria-expanded="false"
      >
        <div class="app-header-user-text d-none d-md-flex">
          <span class="app-header-user-welcome">خوش آمدید</span>
          <span id="headerUserName" class="app-header-user-name">کاربر سیستم</span>
        </div>
        <i class="bi bi-person-circle app-header-user-icon"></i>
      </button>

      <ul class="dropdown-menu dropdown-menu-end app-header-dropdown" aria-labelledby="userMenuBtn">
        <li>
          <a class="dropdown-item app-header-dropdown-item" href="#profile">
            <i class="bi bi-person"></i>
            <span>پروفایل کاربر</span>
          </a>
        </li>
        <li>
          <a class="dropdown-item app-header-dropdown-item" href="#settings">
            <i class="bi bi-gear"></i>
            <span>تنظیمات</span>
          </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <a class="dropdown-item app-header-dropdown-item text-danger" href="#" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i>
            <span>خروج از سامانه</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</header>
