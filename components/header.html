<header class="top-header main-header">
  <div class="container-fluid px-3 d-flex align-items-center justify-content-between header-inner">
    
    <!-- سمت راست: دکمه موبایل + لوگو و عنوان هماهنگ با سایدبار -->
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-link p-0 d-lg-none text-dark" id="menuToggle" aria-label="منوی اصلی">
        <i class="bi bi-list fs-2"></i>
      </button>
      
      <div class="header-brand-wrapper">
        <a href="#dashboard" class="header-brand-link">
          <div class="header-logo-icon">
            <i class="bi bi-shield-check"></i>
          </div>
          <div class="header-brand-text">
            <h1 class="header-title">مدیریت</h1>
            <p class="header-subtitle">داشبورد سازمانی</p>
          </div>
        </a>
      </div>
    </div>

    <!-- سمت چپ: بخش کاربر با ساختار دوخطی و دراپ‌داون اختصاصی -->
    <div class="dropdown header-user-dropdown">
      <button
        class="header-user-trigger"
        type="button"
        id="userMenuBtn"
        data-bs-toggle="dropdown"
        aria-expanded="false"
      >
        <!-- خوش‌آمدگویی دوخطی -->
        <div class="header-user-text d-none d-md-flex">
          <span class="header-user-welcome">خوش آمدید،</span>
          <span id="headerUserName" class="header-user-name">کاربر سیستم</span>
        </div>

        <!-- دایره آیکون کاربر -->
        <div class="header-user-avatar">
          <i class="bi bi-person-circle"></i>
        </div>
      </button>

      <!-- منوی دراپ‌داون هماهنگ با استایل‌های کارت‌های پروژه -->
      <ul class="dropdown-menu dropdown-menu-end header-user-menu shadow-md" aria-labelledby="userMenuBtn">
        <li>
          <a class="dropdown-item header-user-menu-item" href="#profile">
            <i class="bi bi-person-badge"></i>
            <span>پروفایل کاربر</span>
          </a>
        </li>
        <li>
          <a class="dropdown-item header-user-menu-item" href="#settings">
            <i class="bi bi-gear"></i>
            <span>تنظیمات</span>
          </a>
        </li>
        <li><hr class="dropdown-divider header-user-divider"></li>
        <li>
          <a class="dropdown-item header-user-menu-item header-user-logout" href="#" id="logoutBtn">
            <i class="bi bi-power"></i>
            <span>خروج از سامانه</span>
          </a>
        </li>
      </ul>
    </div>

  </div>
</header>
