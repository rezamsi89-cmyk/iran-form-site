<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فراموشی و بازیابی رمز عبور</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />
  <!-- فایل استایل مشترک -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="card auth-card forgot-card fade-in">
    <div class="top-badge">بازیابی رمز عبور</div>

    <div class="card-body">
      <h3 class="text-center mb-2">فراموشی رمز عبور</h3>
      <p class="text-center text-muted mb-4">جهت بازیابی رمز عبور، لطفاً کد ملی ۱۰ رقمی خود را وارد کنید.</p>

      <form id="forgotForm" novalidate>
        <!-- فیلد کد ملی -->
        <div class="mb-4">
          <label for="nationalCode" class="form-label">کد ملی</label>
          <input 
            type="text" 
            class="form-control" 
            id="nationalCode" 
            maxlength="10" 
            inputmode="numeric"
            placeholder="مثال: 0012345678" 
            required 
          />
          <div class="invalid-feedback">لطفاً کد ملی معتبر (۱۰ رقم) وارد کنید.</div>
        </div>

        <!-- پیام‌های خطا و موفقیت -->
        <div class="alert alert-danger d-none mt-3" id="errorAlert"></div>
        <div class="alert alert-success d-none mt-3" id="successAlert">
          هویت شما تایید شد. در حال انتقال به صفحه تغییر رمز عبور...
        </div>

        <!-- دکمه‌ها -->
        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-success btn-custom" id="submitBtn">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="spinner"></span>
            <span id="btnText">بررسی و ادامه</span>
          </button>
          <a href="index.html" class="btn btn-outline-secondary btn-custom">بازگشت به ورود</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://iran-form-api.reza-msi89.workers.dev/forgot";

    const forgotForm = document.getElementById("forgotForm");
    const nationalCodeInput = document.getElementById("nationalCode");
    const submitBtn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const successAlert = document.getElementById("successAlert");
    const errorAlert = document.getElementById("errorAlert");

    // محدودسازی ورودی کد ملی به فقط عدد
    nationalCodeInput.addEventListener("input", () => {
      nationalCodeInput.value = nationalCodeInput.value.replace(/\D/g, "").slice(0, 10);
    });

    // اعتبارسنجی دقیق کد ملی
    function isValidNationalCode(code) {
      return /^\d{10}$/.test(code);
    }

    forgotForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      successAlert.classList.add("d-none");
      errorAlert.classList.add("d-none");

      const codeVal = nationalCodeInput.value.trim();

      if (!forgotForm.checkValidity() || !isValidNationalCode(codeVal)) {
        nationalCodeInput.classList.add("is-invalid");
        forgotForm.classList.add("was-validated");
        return;
      } else {
        nationalCodeInput.classList.remove("is-invalid");
      }

      // وضعیت لودینگ دکمه
      submitBtn.disabled = true;
      spinner.classList.remove("d-none");
      btnText.textContent = " در حال بررسی...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nationalCode: codeVal })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          successAlert.classList.remove("d-none");
          forgotForm.reset();
          forgotForm.classList.remove("was-validated");

          // هدایت به صفحه بازنشانی با انتقال مقادیر تأیید شده
          setTimeout(() => {
            window.location.replace(`reset.html?user=${result.username}&token=${result.token}`);
          }, 2000);
        } else {
          errorAlert.textContent = result.error || "کد ملی وارد شده در سیستم یافت نشد.";
          errorAlert.classList.remove("d-none");
        }
      } catch (error) {
        errorAlert.textContent = "خطا در ارتباط با سرور. وضعیت شبکه را بررسی کنید.";
        errorAlert.classList.remove("d-none");
      } finally {
        submitBtn.disabled = false;
        spinner.classList.add("d-none");
        btnText.textContent = "بررسی و ادامه";
      }
    });
  </script>
</body>
</html>
