<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فراموشی و بازیابی رمز عبور</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  
  <style>
    @font-face {
      font-family: "Shabnam FD";
      src: url("./fonts/Shabnam-FD-Regular.woff2") format("woff2"),
           url("./fonts/Shabnam-FD-Regular.woff") format("woff");
      font-weight: 400;
      font-display: swap;
    }

    * { font-family: "Shabnam FD", Tahoma, sans-serif !important; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #f8f9fa, #e8f5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .forgot-card {
      width: 100%;
      max-width: 430px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      background: #ffffff;
      overflow: hidden;
    }

    .top-badge {
      background: #198754;
      color: white;
      text-align: center;
      padding: 14px;
      font-weight: 700;
      font-size: 18px;
    }

    .card-body { padding: 35px 28px; }

    .form-control {
      border-radius: 12px;
      padding: 12px 14px;
    }

    .btn {
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="card forgot-card">
    <div class="top-badge">بازیابی رمز عبور</div>

    <div class="card-body">
      <p class="text-center text-muted mb-4">جهت بازیابی رمز عبور، لطفاً کد ملی ۱۰ رقمی خود را وارد کنید.</p>

      <form id="forgotForm" novalidate>
        <div class="mb-4">
          <label for="nationalCode" class="form-label">کد ملی</label>
          <input 
            type="text" 
            class="form-control" 
            id="nationalCode" 
            maxlength="10" 
            placeholder="مثال: 0012345678" 
            required 
          />
          <div class="invalid-feedback">لطفاً کد ملی معتبر (۱۰ رقم) وارد کنید.</div>
        </div>

        <div class="alert alert-danger d-none" id="errorAlert"></div>
        <div class="alert alert-success d-none" id="successAlert">
          هویت شما تایید شد. در حال انتقال به صفحه تغییر رمز عبور...
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success" id="submitBtn">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="spinner"></span>
            <span id="btnText">بررسی و ادامه</span>
          </button>
          <a href="index.html" class="btn btn-outline-secondary">بازگشت به ورود</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://iran-form-api.reza-msi89.workers.dev/forgot";

    const forgotForm = document.getElementById("forgotForm");
    const nationalCodeInput = document.getElementById("nationalCode");
    const submitBtn = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const successAlert = document.getElementById("successAlert");
    const errorAlert = document.getElementById("errorAlert");

    // اعتبارسنجی ساده کد ملی (فقط عددی و ۱۰ رقمی بودن)
    function isValidNationalCode(code) {
      if (!/^\d{10}$/.test(code)) return false;
      return true; // در صورت نیاز می‌توان فرمول اعتبارسنجی دقیق کد ملی را هم اینجا قرار داد
    }

    forgotForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      successAlert.classList.add("d-none");
      errorAlert.classList.add("d-none");

      const codeVal = nationalCodeInput.value.trim();

      if (!forgotForm.checkValidity() || !isValidNationalCode(codeVal)) {
        nationalCodeInput.classList.add("is-invalid");
        forgotForm.classList.add("was-validated");
        return;
      } else {
        nationalCodeInput.classList.remove("is-invalid");
      }

      // وضعیت لودینگ
      submitBtn.disabled = true;
      spinner.classList.remove("d-none");
      btnText.textContent = " در حال بررسی...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nationalCode: codeVal })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          successAlert.classList.remove("d-none");
          forgotForm.reset();
          forgotForm.classList.remove("was-validated");

          // انتقال کاربر به صفحه تغییر رمز عبور و پاس دادن موقت کد ملی یا نام کاربری پیدا شده
          setTimeout(() => {
            // می‌توان اطلاعات دریافتی (مثلاً نام کاربری یا توکن بازیابی) را به صفحه reset.html پاس داد
            window.location.href = `reset.html?user=${result.username}&token=${result.token}`;
          }, 2000);
        } else {
          errorAlert.textContent = result.error || "کد ملی وارد شده در سیستم یافت نشد.";
          errorAlert.classList.remove("d-none");
        }
      } catch (error) {
        errorAlert.textContent = "خطا در ارتباط با سرور. وضعیت شبکه را بررسی کنید.";
        errorAlert.classList.remove("d-none");
      } finally {
        submitBtn.disabled = false;
        spinner.classList.add("d-none");
        btnText.textContent = "بررسی و ادامه";
      }
    });
  </script>
</body>
</html>
