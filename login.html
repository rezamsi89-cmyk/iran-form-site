<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود به پنل کاربری</title>

  <!-- Bootstrap 5 RTL CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    @font-face {
      font-family: "Shabnam FD";
      src: url("./fonts/Shabnam-FD-Regular.woff2") format("woff2"),
           url("./fonts/Shabnam-FD-Regular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Shabnam FD";
      src: url("./fonts/Shabnam-FD-Bold.woff2") format("woff2"),
           url("./fonts/Shabnam-FD-Bold.woff") format("woff");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    * {
      font-family: "Shabnam FD", Tahoma, sans-serif !important;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #f8f9fa, #e8f5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      background: #ffffff;
    }

    .login-card .card-body {
      padding: 35px 28px;
    }

    .login-title {
      color: #198754;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: #6c757d;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px 14px;
    }

    .btn {
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
    }

    .forgot-link {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      color: #198754;
      font-size: 14px;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .top-badge {
      background: #198754;
      color: white;
      text-align: center;
      padding: 14px;
      font-weight: 700;
      font-size: 18px;
    }
  </style>

<script>
  if (localStorage.getItem('token')) {
    window.location.href = './index.html';
  }
</script>
  
</head>
<body>
  <div class="card login-card">
    <div class="top-badge">پنل ورود کاربران</div>

    <div class="card-body">
      <h3 class="text-center login-title">ورود به سایت</h3>
      <p class="text-center login-subtitle">لطفاً اطلاعات ورود خود را وارد کنید</p>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">نام کاربری</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="نام کاربری خود را وارد کنید"
            required
          />
          <div class="invalid-feedback">
            لطفاً نام کاربری را وارد کنید.
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">رمز عبور</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="رمز عبور خود را وارد کنید"
              required
              style="border-radius: 0 12px 12px 0;"
            />
            <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-radius: 12px 0 0 12px; border-color: #dee2e6;">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
            <div class="invalid-feedback">
              لطفاً رمز عبور را وارد کنید.
            </div>
          </div>
        </div>

        <div class="alert alert-danger d-none mt-3" id="errorAlert"></div>
        <div class="alert alert-success d-none mt-3" id="successAlert">
          ورود با موفقیت انجام شد. در حال انتقال...
        </div>

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-success" id="loginBtn">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="loginSpinner"></span>
            <span id="loginBtnText">ورود</span>
          </button>
          <a href="register.html" class="btn btn-outline-secondary">ثبت‌نام جدید</a>
        </div>

        <div class="text-center">
          <a href="forgot.html" class="forgot-link">فراموشی رمز عبور</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://iran-form-api.reza-msi89.workers.dev/login";

    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const successAlert = document.getElementById("successAlert");
    const errorAlert = document.getElementById("errorAlert");
    const loginBtn = document.getElementById("loginBtn");
    const loginSpinner = document.getElementById("loginSpinner");
    const loginBtnText = document.getElementById("loginBtnText");

    // قابلیت نمایش و مخفی کردن پسورد
    const togglePassword = document.getElementById("togglePassword");
    const eyeIcon = document.getElementById("eyeIcon");

    togglePassword.addEventListener("click", function () {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      eyeIcon.classList.toggle("bi-eye");
      eyeIcon.classList.toggle("bi-eye-slash");
    });

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      successAlert.classList.add("d-none");
      errorAlert.classList.add("d-none");

      if (!loginForm.checkValidity()) {
        loginForm.classList.add("was-validated");
        return;
      }

      const username = usernameInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      // اعمال وضعیت بارگذاری
      loginBtn.disabled = true;
      loginSpinner.classList.remove("d-none");
      loginBtnText.textContent = " در حال بررسی...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          successAlert.classList.remove("d-none");
          loginForm.classList.remove("was-validated");

          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("username", username);

          setTimeout(() => {
            window.location.href = "index.html";
          }, 1500);
        } else {
          errorAlert.textContent = result.error || "نام کاربری یا رمز عبور اشتباه است.";
          errorAlert.classList.remove("d-none");
        }
      } catch (error) {
        errorAlert.textContent = "ارتباط با سرور برقرار نشد. لطفاً اینترنت خود را بررسی کنید.";
        errorAlert.classList.remove("d-none");
      } finally {
        loginBtn.disabled = false;
        loginSpinner.classList.add("d-none");
        loginBtnText.textContent = "ورود";
      }
    });
  </script>

<script>
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (response.ok && data.token) {
        localStorage.setItem('token', data.token);
        window.location.href = './index.html';
      } else {
        alert(data.message || 'نام کاربری یا رمز عبور اشتباه است.');
      }
    } catch (err) {
      alert('خطا در ارتباط با سرور');
    }
  });
</script>
  
</body>
</html>
